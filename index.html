<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kruthik's Mind-Blowing Page</title>
<style>
  /* Reset & body */
  * {margin:0; padding:0; box-sizing:border-box;}
  body {
    height:100vh; 
    overflow:hidden; 
    font-family: 'Arial', sans-serif; 
    background:#0a0a0a;
    color:#fff;
    display:flex; justify-content:center; align-items:center;
    perspective:1000px;
  }

  /* Neon Glitch Text */
  .glitch {
    font-size:4rem; font-weight:bold;
    position:relative; 
    color:#0ff;
    animation: flicker 2s infinite;
  }
  .glitch::before, .glitch::after {
    content: 'Kruthik';
    position:absolute; top:0; left:0;
  }
  .glitch::before {color:#f0f; z-index:-1; clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);}
  .glitch::after {color:#ff0; z-index:-2; clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);}
  @keyframes flicker {
    0%,19%,21%,23%,25%,54%,56%,100% {opacity:1;}
    20%,22%,24%,55% {opacity:0;}
  }

  /* Particle canvas */
  #particles {
    position:absolute; top:0; left:0; width:100%; height:100%;
    z-index:-3;
  }

  /* Floating orbs */
  .orb {
    position:absolute; width:20px; height:20px; border-radius:50%;
    background: radial-gradient(circle, #0ff, #00f);
    mix-blend-mode: screen;
    animation: float 5s infinite alternate ease-in-out;
  }
  @keyframes float {
    0% {transform: translate3d(0,0,0);}
    100% {transform: translate3d(50px, -100px, 50px);}
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="glitch">Kruthik</div>

<script>
  // Particle JS
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const colors = ['#0ff','#f0f','#ff0','#0f0','#f00','#00f'];

  for(let i=0;i<200;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r: Math.random()*3+1,
      dx:(Math.random()-0.5)*2,
      dy:(Math.random()-0.5)*2,
      color: colors[Math.floor(Math.random()*colors.length)]
    });
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x += p.dx;
      p.y += p.dy;
      if(p.x<0||p.x>canvas.width)p.dx*=-1;
      if(p.y<0||p.y>canvas.height)p.dy*=-1;

      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();

  // Floating Orbs dynamically
  for(let i=0;i<15;i++){
    const orb = document.createElement('div');
    orb.className='orb';
    orb.style.top=Math.random()*window.innerHeight+'px';
    orb.style.left=Math.random()*window.innerWidth+'px';
    orb.style.width=orb.style.height=(10+Math.random()*30)+'px';
    orb.style.animationDuration=(3+Math.random()*5)+'s';
    document.body.appendChild(orb);
  }

  // Mouse interactive glow
  document.addEventListener('mousemove', e=>{
    particles.forEach(p=>{
      let dx = p.x - e.clientX;
      let dy = p.y - e.clientY;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 100){
        p.dx += dx*0.0005;
        p.dy += dy*0.0005;
      }
    });
  });
</script>

</body>
</html>
